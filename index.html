<!DOCTYPE html>
<html>
<head>
    <title>Cookie Clicker</title>
</head>
<body>
    <h1>Cookie Clicker 🍪</h1>
    <h2 id="counter">0</h2>
    <button onclick="addCookie()">Click Me!</button>

    <script>
        let count = 0;
        function addCookie() {
            count++;
            document.getElementById("counter").innerText = count;
        }
    </script>
</body>
</html>
